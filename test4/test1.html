<script>
        const result=document.getElementById('result');

    function compare_versions(version1,version2){
        const p=document.createElement('p');
        var v1=version1.split('.').map(Number);
        var v2=version2.split('.').map(Number);
        var count=Math.max(v1.length,v2.length)
        for(let i=0;i<count;i++){
            if(v1[i]>v2[i])
            {
                p.textContent=`版本比较：${version1}>${version2}`;
                result.appendChild(p);
                return ;
            }
            else if(v1[i]<v2[i]){
                p.textContent=`版本比较：${version1}<${version2}`;
                result.appendChild(p);
                return ;
            }
        }
    }
    function compareVersions(){
        const version1=document.getElementById('v1').value;
        const version2=document.getElementById('v2').value;
        compare_versions(version1,version2);
    }
