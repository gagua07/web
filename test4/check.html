<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回文字符串判断</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2);
            background: white;
        }

        input[type="text"]::placeholder {
            color: #95a5a6;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(231, 76, 60, 0.3);
        }

        .result-area {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            min-height: 100px;
            display: none;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .result-area.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-content {
            color: #2c3e50;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .result-content .original {
            color: #3498db;
        }

        .result-content .cleaned {
            color: #9b59b6;
        }

        .result-content .verdict {
            font-size: 1.3rem;
            font-weight: 600;
            display: block;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .result-content .verdict.yes {
            color: #27ae60;
        }

        .result-content .verdict.no {
            color: #e74c3c;
        }

        .examples {
            margin-top: 25px;
            padding: 15px;
            background: rgba(236, 240, 241, 0.5);
            border-radius: 8px;
        }

        .examples h3 {
            color: #2c3e50;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .examples ul {
            list-style: none;
            padding-left: 0;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .examples li {
            padding: 3px 0;
            padding-left: 15px;
            position: relative;
        }

        .examples li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>回文字符串判断</h2>
        <p class="subtitle">输入字符串，判断是否是对称的回文</p>

        <div class="form-group">
            <label for="inputStr">请输入字符串：</label>
            <div class="input-wrapper">
                <input type="text" id="inputStr" placeholder="例如: level 或 A man a plan a canal Panama">
                <button onclick="handleCheck()">检测</button>
            </div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-label">检测结果</div>
            <div class="result-content" id="resultContent">等待检测...</div>
        </div>

        <div class="examples">
            <h3>测试示例</h3>
            <ul>
                <li>mom → true</li>
                <li>noon → true</li>
                <li>hello → false</li>
                <li>A man a plan a canal Panama → true</li>
            </ul>
        </div>
    </div>

    <script>
        function checkPalindrome(str) {
            const cleaned = str.toLowerCase().replace(/[^a-z0-9]/g, '');
            const reversed = cleaned.split('').reverse().join('');
            return {
                original: str,
                cleaned: cleaned,
                reversed: reversed,
                isPalindrome: cleaned === reversed
            };
        }

        function handleCheck() {
            const input = document.getElementById('inputStr');
            const resultArea = document.getElementById('resultArea');
            const resultContent = document.getElementById('resultContent');
            
            const value = input.value.trim();
            
            if (value === '') {
                resultContent.innerHTML = '<span class="verdict no">请输入字符串</span>';
                resultArea.classList.add('show');
                return;
            }
            
            // 调用你的checkPalindrome函数
            const result = checkPalindrome(value);
            
            // 在页面上显示详细结果
            let html = `
                <span class="original">原始输入："${result.original}"</span><br><br>
                <span class="cleaned">清洗后："${result.cleaned}"</span><br>
                <span class="cleaned">反转后："${result.reversed}"</span><br><br>
            `;
            
            if (result.isPalindrome) {
                html += `<span class="verdict yes">✅ 是回文字符串！</span>`;
            } else {
                html += `<span class="verdict no">❌ 不是回文字符串</span>`;
            }
            
            resultContent.innerHTML = html;
            resultArea.classList.add('show');
        }

        // 新增：支持回车键检测
        document.getElementById('inputStr').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleCheck();
            }
        });
    </script>
</body>
</html>
